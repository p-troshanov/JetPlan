# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Порты не выводим. Доступ только по внутренней сети для сервиса backend

  backend:
    # Указываем корень проекта как контекст для сборки
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - db
    # Выводим порт строго на локалхост для безопасности и проксирования
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  postgres_data:
